<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sum Two Numbers :) </title>
</head>
<body>
  <h1>Operations with two int numbers=) </h1>
  <input type="number" id="num1" placeholder="First number" />

  <select id="operation">
    <option value="sum">+</option>
    <option value="sub">-</option>
    <option value="mul">*</option>
    <option value="div">/</option>
  </select>

  <input type="number" id="num2" placeholder="Second number" />
  <button type="button" id="btnSum">Sum</button>
  <p>Result: <strong id="result">—</strong></p>

  <!-- Link to the compiled JS (compile sum.ts with: tsc sum.ts) -->
  <script src="sum.js"></script>
  <script>
    document.getElementById('btnSum').addEventListener('click', function () {
      var a = Number(document.getElementById('num1').value) || 0;
      var b = Number(document.getElementById('num2').value) || 0;
      var op = document.getElementById('operation').value;

      var result;

      if (op === 'sum') result = sum(a, b);
      if (op === 'sub') result = sub(a, b);
      if (op === 'mul') result = mul(a, b);
      if (op === 'div') result = div(a, b);

      document.getElementById('result').textContent = result;
    });
  </script>
</body>
</html>
